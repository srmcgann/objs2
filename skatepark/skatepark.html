<!DOCTYPE html>
<html>
  <head>
    <title>Coordinates boilerplate example</title>
    <style>
      body, html{
        background: #000;
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
<script type="module">

  import * as Coordinates from
  "https://srmcgann.github.io/Coordinates/coordinates.min.js"

  var rendererOptions = {
    ambientLight: .5, margin: 0,
    fov: 1e3, width: 1920, height: 1080,
  }
  var renderer = await Coordinates.Renderer(rendererOptions)
  
  var refTexture = 'https://srmcgann.github.io/skyboxes/HDRI/28.jpg'
  
  var S = Math.sin
  var C = Math.cos
  var Rn = Math.random
  
  var x, y, z, p, q, d
  
  Coordinates.AnimationLoop(renderer, 'Draw')

  var shaderOptions = [
    {lighting: {type: 'ambientLight', value: .4}},
    { uniform: {
      type: 'phong',
      value: .05
    } },
    { uniform: {
      type: 'reflection',
      map: refTexture,
      value: .1
    } },
    { uniform: {
      type: 'refraction2',
      angleOfRefraction: 1,
      map: refTexture,
      value: .9
    } },
  ]
  var shader = await Coordinates.BasicShader(renderer, shaderOptions)

  var shaderOptions = [
    {lighting: {type: 'ambientLight', value: 1}},
    { uniform: {
      type: 'phong',
      value: 0
    } }
  ]
  var backgroundShader = await Coordinates.BasicShader(renderer, shaderOptions)


  var shapes = []

  var geoOptions = {
    shapeType: 'dodecahedron',
    name: 'background',
    sphereize: 1,
    subs: 4,
    map: refTexture,
    size: 5e3,
    colorMix: 0,
  }
  await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
    shapes.push(geometry)
    await backgroundShader.ConnectGeometry(geometry)
  })  
  
  var geoOptions = {
    shapeType: 'obj',
    url: 'https://srmcgann.github.io/objs2/skatepark/skatepark_obj.zip',
    map: 'https://srmcgann.github.io/objs2/skatepark/texture.png',
    scaleX: 20,
    scaleY: 20,
    scaleZ: 20,
    objY: -25,
    //partitionSize: 1,
    //partitionRadius: 10,
    colorMix: 0,
  }
  await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
    shapes.push(geometry)
    await shader.ConnectGeometry(geometry)
  })
  
  
  if(1) Coordinates.LoadFPSControls(renderer, {
    flyMode: true,
    mSpeed: .25,
    crossharSel: 2,
    crosshairSize: .5,
  })
  
  renderer.z = renderer.width > 1e3 ? 10 : 20
  
  window.Draw = () => {
    var t = renderer.t
    renderer.Clear()
    shapes.forEach(shape => {
      switch(shape.name){
        case 'background':
          renderer.Draw(shape)
        break
        case 'main':
          renderer.Draw(shape)
        break
        default:
          renderer.Draw(shape)
        break
      }
    })
  }
  
</script>
  </body>
</html>
