<!DOCTYPE html>
<html>
  <head>
    <title>Coordinates boilerplate example</title>
    <style>
      @font-face {
        font-family: 'Technology';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url(https://srmcgann.github.io/objs/car/Technology-Bold.woff2) format('woff2');
      }
      html, body{
        background-repeat: no-repeat;
        background-position: center center;
        background-image: background-size: 100% 100%;
        background-color: #000;
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
      }
      .loadingText{
        position: absolute;
        color: #888;
        font-family: Technology;
        font-size: 200px;
        width: 600px;
        display: block;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .overlay{
        position: fixed;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        background: #111e;
        z-index: 100;
        display: none;
      }
    </style>
  </head>
  <body>
<script type="module">

  import * as Coordinates from
  "https://srmcgann.github.io/Coordinates/coordinates.min.js"

  var rendererOptions = {
    ambientLight: .5, margin: 0,
    fov: 900, width: 1920, height: 1080,
    //fov: 1e3/2, width: 1920/2, height: 1080/2,
    // uncomment above for lower-res, higher-performance canvas
  }
  var renderer = await Coordinates.Renderer(rendererOptions)
  
  //var refTexture = 'https://srmcgann.github.io/skyboxes/HDRI/19.jpg'
  //var refTexture = 'https://srmcgann.github.io/skyboxes2/HDRI/milkyWay.jpg'
  //var refTexture = 'https://srmcgann.github.io/skyboxes3/HDRI/doommaze.jpg'
  //var refTexture = 'https://srmcgann.github.io/skyboxes/HDRI/28.jpg'
  var refTexture = 'https://srmcgann.github.io/skyboxes4/HDRI/brutalism2_maze.jpg'
  
  var S = Math.sin
  var C = Math.cos
  var Rn = Math.random
  
  var x, y, z, p, q, d
  
  var ax, ay, az
  var levelSize = 200 / 4
  var ctx = Coordinates.Overlay.ctx
  var c = Coordinates.Overlay.c
  var w = c.width
  var h = c.height
  var muted = false
  
  Coordinates.AnimationLoop(renderer, 'Draw')

  var shaderOptions = [
    {lighting: {type: 'ambientLight', value: .6}},
    { uniform: {
      type: 'phong',
      value: .4
    } },
    { uniform: {
      type: 'reflection',
      map: refTexture,
      value: 0
    } },
  ]
  var shader = await Coordinates.BasicShader(renderer, shaderOptions)

  var shaderOptions = [
    {lighting: {type: 'ambientLight', value: .8}},
    { uniform: {
      type: 'phong',
      value: .05
    } },
    { uniform: {
      type: 'reflection',
      map: refTexture,
      value: .15
    } },
    { uniform: {
      type: 'refraction2',
      angleOfRefraction: 1,
      map: refTexture,
      value: .8
    } },
  ]
  var glassShader = await Coordinates.BasicShader(renderer, shaderOptions)

  var buttons = [
    {
      x: c.width - 85,
      y: 5,
      name: 'mute button',
      actCap: '[M] ' + (['\uD83D', '\uDD0A']).join(''),
      inactCap: '[M] ' + (['\uD83D', '\uDD07']).join(''),
      activeStrokeStyle: '#0f48',
      activeFillStyle: '#0628',
      inactiveStrokeStyle: '#c008',
      inactiveFillStyle: '#6008',
      activeTextColor: '#8fc',
      inactiveTextColor: '#f88',
      width: 80,
      height: 32,
      fontSize: 24,
      activeState: true,
      enabled: true,
      toolTip: 'mute / unmute',
      hover: false,
      clickScript: 'ToggleMute()',
    },
  ]


  const ToggleMute = (forceToggleButton = false) => {
    muted = !muted
    if(forceToggleButton){
      var el = buttons.filter(button => button.name = 'mute button')[0]
      el.activeState = !el.activeState
    }
    if(muted){
      if(!shotgunSound.paused){
        shotgunSound.pause()
      }
    }
  }
  
  var mouseReady = true
  window.onmouseup = () => {
    mouseReady = true
  }
  
  const HandleButtons = () => {
/*
    {
      x: c.width - 200,
      y: 20,
      actCap: '🔊'
      inactCap: '🔇'
      activeStrokeStyle: '#0f4'
      activeFillStyle: '#0628'
      inactiveStrokeStyle: '#c00'
      inactiveFillStyle: '#6008'
      activeTextColor: '#8fc',
      inactiveTextColor: '#f88',
      width: 100,
      height: 32,
      fontSize: 24,
      activeState: false,
      enabled: true,
    }
*/      


    //ctx.fillStyle = '#f00'
    //var s = 20
    var mx = renderer.mouseX
    var my = renderer.mouseY
    //ctx.fillRect(mx-s/2, my-s/2, s, s)
    ctx.textAlign = 'center'
    buttons.map((button, bIdx) => {
      var x1 = button.x
      var y1 = button.y
      var x2 = button.x + button.width
      var y2 = button.y + button.height
      if(button.activeState){
        ctx.strokeStyle = button.activeStrokeStyle
        ctx.fillStyle = button.activeFillStyle
        ctx.fillRect(button.x, button.y, button.width, button.height)
        ctx.strokeRect(button.x, button.y, button.width, button.height)
        ctx.fillStyle = button.activeTextColor
        fs = button.fontSize
        ctx.font = fs + 'px Technology'
        ctx.fillText(button.actCap,
                     button.x + button.width/2,
                     button.y + button.height/2 + fs/3)
      }else{
        ctx.strokeStyle = button.inactiveStrokeStyle
        ctx.fillStyle = button.inactiveFillStyle
        ctx.fillRect(button.x, button.y, button.width, button.height)
        ctx.strokeRect(button.x, button.y, button.width, button.height)
        ctx.fillStyle = button.inactiveTextColor
        fs = button.fontSize
        ctx.font = fs + 'px Technology'
        ctx.fillText(button.inactCap,
                     button.x + button.width/2,
                     button.y + button.height/2 + fs/3)
      }
      var fs = 16
      ctx.font = fs + 'px Technology'
      if(mouseReady){
        if(((button.hover || renderer.mouseButton == -1)) &&
          mx >= x1 && mx < x2 && my >= y1 && my < y2){
          button.hover = true
          ctx.fillStyle = '#333c'
          var textWidth = ctx.measureText(button.toolTip).width
          if(c.width-mx < textWidth + 5){
            ctx.fillRect(mx - textWidth - 20, my, textWidth + 20, fs*2)
            ctx.fillStyle = '#fffc'
            ctx.fillText(button.toolTip,
                  mx - textWidth/2 - 10, my+fs*1.33)
          }else{
            ctx.fillRect(mx - 10, my, textWidth + 20, fs*2)
            ctx.fillStyle = '#fffc'
            ctx.fillText(button.toolTip,
                  mx + textWidth/2, my+fs*1.33)
          }
          if(renderer.mouseButton != -1){
            if(!(mx >= x1 && mx < x2 && my >= y1 && my < y2)){
              button.hover = false
            }
            button.activeState = !button.activeState
            mouseReady = false
            eval(button.clickScript)
          }
        }else{
          button.hover = false
        }
      }
    })
  }

  var iPc = 9e3
  var geometryData = Array(iPc).fill().map((v, i) => {
    return [1e5, 1e5, 1e5]
  })
  var colors = []
  Array(iPc).fill().map((v, i) => {
    var rgb   = Coordinates.HSVToRGB(360/iPc*i, 1, 1)
    var red   = rgb[0] / 256
    var green = rgb[1] / 256
    var blue  = rgb[2] / 256
    colors.push(red, green, blue, 1)
  })
  
  // create custom attribute shader
  var shaderOptions = [
    { attribute: {
      type: 'custom',
      enabled: true,         // can be disabled (removed from shader)
      value: colors,         // buffer data
      name: 'customColors',  // attribute name to inject into shader
      stride: 4,             // in this case, we're passing RGBA floats
      dataType: renderer.ctx.FLOAT,
      vertDeclaration: `     // vertex shader code, pre main
        attribute vec4 customColors;
        varying vec4 attribCols;
      `,
      vertCode:        `     // vertex shader code, in main function
        attribCols = customColors;
      `,
      fragDeclaration: `     // fragment shader code, pre main
        varying vec4 attribCols;
      `,
      fragCode: `            // fragment shader code, in main function
        mixColor = attribCols;
      `,
    }},
  ]
  var particleShader = await Coordinates.BasicShader(renderer, shaderOptions)

  var shaderOptions = [
    {lighting: {type: 'ambientLight', value: .05}},
    { uniform: {
      type: 'phong',
      value: .05
    } },
    { uniform: {
      type: 'reflection',
      map: refTexture,
      value: .1
    } },
    { uniform: {
      type: 'refraction2',
      map: refTexture,
      angleOfRefraction: .5,
      value: .3,
    } },
  ]
  var enclosureShader = await Coordinates.BasicShader(renderer, shaderOptions)

  var shaderOptions = [
    {lighting: {type: 'ambientLight', value: 1.33}},
    { uniform: {
      type: 'phong',
      value: 0
    } }
  ]
  var backgroundShader = await Coordinates.BasicShader(renderer, shaderOptions)

  var shotgun = new Image()
  var url = 'https://srmcgann.github.io/objs2/shooter/shotgun.png'
  fetch(url).then(res=>res.blob()).then(data => {
    shotgun.src = URL.createObjectURL(data)
  })

  var shotshell = new Image()
  var url = 'https://srmcgann.github.io/objs2/shooter/shotShell.png'
  fetch(url).then(res=>res.blob()).then(data => {
    shotshell.src = URL.createObjectURL(data)
  })

  var health = new Image()
  var url = 'https://srmcgann.github.io/objs2/shooter/health.png'
  fetch(url).then(res=>res.blob()).then(data => {
    health.src = URL.createObjectURL(data)
  })

  var shotgunSound = new Audio()
  var url = 'https://srmcgann.github.io/objs2/shooter/shotgun.ogg'
  fetch(url).then(res=>res.blob()).then(data => {
    shotgunSound.volume = .25
    shotgunSound.src = URL.createObjectURL(data)
  })

  var HUD = new Image()
  var url = 'https://srmcgann.github.io/objs2/shooter/HUD.png'
  fetch(url).then(res=>res.blob()).then(data => {
    HUD.src = URL.createObjectURL(data)
  })

  var shapes = []

  var geoOptions = {
    shapeType: 'particles',
    name: 'particles',
    geometryData,
    alpha: .9,
    penumbra: .25,
    size: 1.5,
    color: 0xff0000,
  }
  await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
    shapes.push(geometry)
    await particleShader.ConnectGeometry(geometry)
  })  

  var geoOptions = {
    shapeType: 'dodecahedron',
    name: 'background',
    sphereize: 1,
    subs: 4,
    map: refTexture,
    size: 5e3,
    colorMix: 0,
  }
  await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
    shapes.push(geometry)
    await backgroundShader.ConnectGeometry(geometry)
  })  
  var geoOptions = {
    shapeType: 'obj',
    //map: 'https://srmcgann.github.io/objs2/testEnvironment/texture.png',
    url: 'https://srmcgann.github.io/objs2/testEnvironment/enclosure.obj',
    name: 'enclosure',
    cullFace: '',
    disableDepthTest: true,
    alpha: .9,
    scaleX: levelSize,
    scaleY: levelSize,
    scaleZ: levelSize,
    color: 0x00ffff,
    colorMix: .2,
    objY: -100,
  }
  if(0) await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
    shapes.push(geometry)
    await enclosureShader.ConnectGeometry(geometry)
  })
  
  
  var floorShape
  var floorLookup
  var resolution = 20
  var geoOptions = {
    shapeType: 'obj',
    //map: 'https://srmcgann.github.io/objs2/island/texture.png',
    //url: 'https://srmcgann.github.io/objs2/island/land.obj?3',
    map: 'https://srmcgann.github.io/objs2/cathedral/texture.png',
    url: 'https://srmcgann.github.io/objs2/cathedral/cathedral.obj?3',
    name: 'main',
    scaleX: levelSize,
    scaleY: levelSize,
    scaleZ: levelSize,
    colorMix: 0,
    objY: -100,
  }
  await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
    var minx = 6e6
    var maxx = -6e6
    var miny = 6e6
    var maxy = -6e6
    var minz = 6e6
    var maxz = -6e6
    for(var i = 0; i < geometry.vertices.length; i += 9){
      var x1 = geometry.vertices[i+0]
      var z1 = geometry.vertices[i+2]
      var x2 = geometry.vertices[i+3]
      var z2 = geometry.vertices[i+5]
      var x3 = geometry.vertices[i+6]
      var z3 = geometry.vertices[i+8]
      ax = (x1+x2+x3) / 3
      az = (z1+z2+z3) / 3
      if(ax < minx) minx = ax
      if(ax > maxx) maxx = ax
      if(az < minz) minz = az
      if(az > maxz) maxz = az
    }
    floorLookup = Array(resolution**2).fill().map((v, i) => ({
      cx: 0, cz: 0, polyCenters: [],
    }))
    var width = (maxx-minx) * 1.00001
    var depth = (maxz-minz) * 1.00001
    for(var i = 0; i < geometry.vertices.length; i += 9){
      var x1 = geometry.vertices[i+0]
      var y1 = geometry.vertices[i+1]
      var z1 = geometry.vertices[i+2]
      var x2 = geometry.vertices[i+3]
      var y2 = geometry.vertices[i+4]
      var z2 = geometry.vertices[i+5]
      var x3 = geometry.vertices[i+6]
      var y3 = geometry.vertices[i+7]
      var z3 = geometry.vertices[i+8]
      ax = (x1+x2+x3) / 3
      ay = (y1+y2+y3) / 3
      az = (z1+z2+z3) / 3
      var idx1 = (ax-minx)/width*resolution | 0
      var idx2 = (az-minz)/depth*resolution | 0
      var idx = idx1 + idx2*resolution
      floorLookup[idx].polyCenters.push({ x: ax, y: ay, z: az })
    }
    floorLookup.map((v, i) => {
      var ax = 0
      //var ay = 0
      var az = 0
      v.polyCenters.map((q, j) => {
        ax += q.x
        //ay += q.y
        az += q.z
      })
      v.cx = ax /= v.polyCenters.length
      v.cz = az /= v.polyCenters.length
    })
    floorShape = geometry
    shapes.push(geometry)
    await shader.ConnectGeometry(geometry)
  })

  var geoOptions = {
    shapeType: 'obj',
    map: 'https://srmcgann.github.io/objs2/cathedral/texture.png',
    url: 'https://srmcgann.github.io/objs2/cathedral/glass.obj?s2',
    name: 'glass',
    scaleX: levelSize,
    scaleY: levelSize,
    scaleZ: levelSize,
    colorMix: 0,
    objY: -100,
  }
  if(1)await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
    shapes.push(geometry)
    await glassShader.ConnectGeometry(geometry)
  })
  
  var geoOptions = {
    shapeType: 'obj',
    map: 'https://srmcgann.github.io/objs2/island/texture.png',
    url: 'https://srmcgann.github.io/objs2/island/ocean and trees.obj',
    name: 'main',
    scaleX: levelSize,
    scaleY: levelSize,
    scaleZ: levelSize,
    colorMix: 0,
    objY: -100,
  }
  if(0)await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
    shapes.push(geometry)
    await shader.ConnectGeometry(geometry)
  })
  
  var markers = []
  const Floor = (x, z) => {
    markers = []
    var mind = 6e6, idx = -1, ret = 0
    floorLookup.forEach((v, i) => {
      if((d=Math.hypot(v.cx-x, v.cz-z))<mind){
        mind = d
        idx = i
      }
    })
    mind = 6e6
    floorLookup[idx].polyCenters.forEach((v, i) => {
      markers.push([v.x, v.y, v.z])
      if((d=Math.hypot(v.x-x, v.z-z)) < mind){
        mind = d
        ret = v.y
      }
    })
    return ret
  }
  
  var players = []
  var keyTimerInterval = .2
  var camSel = 0
  var jumpHeight = 10
  var grav = .75
  var playerMdrag = 1.1
  var playerSpeed = .1
  var playerHeight = 28 / 2
  var G = 220 / 50 * levelSize
  const SpawnPlayer = () => {
    players.push({
      x: 0,
      y: 0,
      z: 0,
      vx: 0,
      vy: 0,
      vz: 0,
      roll: 0,
      pitch: 0,
      yaw: 0,
      ammo: 25,
      health: 100,
      shotTimer: 0,
      keys: Array(256).fill(false),
      keyTimers: Array(256).fill(0),
      id: players.length,
      hasTraction: false,
      name: 'human player',
    })
  }
  
  window.onclick = () => {
    if(!buttons.filter(button=>button.name=='mute button')[0].hover){
      if(!document.pointerLockElement){
        renderer.c.requestPointerLock()
      }
    }
  }
  
  window.onmousemove = e => {
    if(document.pointerLockElement){
      var player = players[0]
      player.yaw -= e.movementX / 100
      player.pitch += e.movementY / 100
    }
  }
  
  window.onkeydown = e => {
    console.log(e.keyCode)
    if(e.keyCode == 77){
      ToggleMute(true)
    }
    players[0].keys[e.keyCode] = true
  }
  
  window.onkeyup = e => {
    players[0].keys[e.keyCode] = false
  }
  
  const DoKeys = () => {
    var player = players[0]
    player.keys.map((state, key) =>{
      if(state){
        switch(key){
          case 32: // space
            if(player.keyTimers[key] < renderer.t)
            player.keyTimers[key] = renderer.t + keyTimerInterval
          break
          case 37: // left arrow
          break
          case 38: // up arrow
          break
          case 39: // right arrow
          break
          case 40: // down arrow
          break
          case 87: //W
            if(player.hasTraction){
              var p = -renderer.yaw + Math.PI
              var accel = player.keys[16] ? 3 : 1
              player.vx += S(p) * playerSpeed * accel
              player.vz += C(p) * playerSpeed * accel
            }
          break
          case 65: //A
            if(player.hasTraction){
              var p = -renderer.yaw + Math.PI/2
              var accel = player.keys[16] ? 3 : 1
              player.vx += S(p) * playerSpeed * accel
              player.vz += C(p) * playerSpeed * accel
            }
          break
          case 83: //S
            if(player.hasTraction){
              var p = -renderer.yaw
              var accel = player.keys[16] ? 3 : 1
              player.vx += S(p) * playerSpeed * accel
              player.vz += C(p) * playerSpeed * accel
            }
          break
          case 68: //D
            if(player.hasTraction){
              var p = -renderer.yaw - Math.PI / 2
              var accel = player.keys[16] ? 3 : 1
              player.vx += S(p) * playerSpeed * accel
              player.vz += C(p) * playerSpeed * accel
            }
          break
        }
      }
    })
  }
  
  SpawnPlayer()
  
  Coordinates.LoadFPSControls(renderer, {
    flyMode: true,
    useKeys: false,
    crosshairSel: 1,
    crosshairAlpha: .1,
    crosshairSize: 2,
    mSpeed: 2,
  })
  
  var shotSize = 10
  var shotspeed  = 10
  var shotTimerInterval  = .5
  var buckshot = []
  const SpawnShot = player => {
    x = -player.x
    y = -player.y - 2
    z = -player.z
    var p1 = -player.yaw
    var p2 = -player.pitch
    if(!shotgunSound.paused) shotgunSound.pause()
    if(!muted){
      shotgunSound.currentTime = 0
      shotgunSound.play()
    }
    for(var i = 0; i < shotSize; i++){
      var vx = 0
      var vy = 0
      var vz = shotspeed
      p = Math.atan2(vy, vz) + p2
      d = Math.hypot(vy, vz)
      vy = S(p) * d
      vz = C(p) * d
      p = Math.atan2(vx, vz) + p1
      d = Math.hypot(vx, vz)
      vx = S(p) * d
      vz = C(p) * d
      buckshot.push({
        x, y, z,
        vx: vx + ((Rn()-.5)*1),
        vy: vy + ((Rn()-.5)*1),
        vz: vz + ((Rn()-.5)*1),
        life: 1
      })
    }
  }
  
  var iSparkv = .5
  var iSparkc = 5
  var sparks = []
  const SpawnSparks = (x, y, z) => {
    for(var i = 0; i < iSparkc; i++){
      var p1 = Rn() * Math.PI * 2
      var p2 = Math.PI/2 *Rn()** .5
      var vx = S(p1) * S(p2) * iSparkv
      var vy = C(p2) * iSparkv * 2
      var vz = C(p1) * S(p2) * iSparkv
      sparks.push({
        x, y, z,
        vx, vy, vz,
        life: 1
      })
    }
  }
  
  renderer.z = renderer.width > 1e3 ? 10 : 20
  var fl 
  
  window.Draw = () => {
    var t = renderer.frameCount / 60
    renderer.Clear()
  
    DoKeys()
    
    var player = players[camSel]
    
    if(renderer.mouseButton == -1){
        player.shotTimer = 0
    }
    
    // jump
    if(renderer.mouseButton == 2 && player.hasTraction) {
      player.vy -= jumpHeight
    }
  
    if(renderer.mouseButton == 1 &&
       !buttons.filter(button=>button.name=='mute button')[0].hover) {
      if(player.shotTimer <= t && player.ammo > 0){
        player.shotTimer = t + shotTimerInterval
        player.ammo--
        SpawnShot(player)
      }
    }
  
    var tx = player.vx
    var tz = player.vz
    d = Math.hypot(tx, tz) + .0001
    tx = tx/d+(tx*2)
    tz = tz/d+(tz*2)
    var tfl = -Floor(-player.x-tx, -player.z-tz)
    
    if(player.hasTraction && ((player.y - (tfl-playerHeight)) > 160)){
      //&& !((player.y - (tfl-playerHeight)) > 32)){
      player.vx *= -.2
      player.vz *= -.2
    }else{
      //if(!((player.y - (tfl-playerHeight)) > 32)) fl = tfl
      fl = tfl
    }
    player.y += player.vy += grav
    player.y = Math.min(fl - playerHeight, player.y)
    if(player.hasTraction = player.y > fl-playerHeight-1){
      player.vy = 0
      player.y = fl-playerHeight
    }
    if(player.x >= G) {
      player.x = G
      player.vx *= -.2
    }
    if(player.x <= -G) {
      player.x = -G
      player.vx *= -.2
    }
    if(player.z >= G) {
      player.z = G
      player.vz *= -.2
    }
    if(player.z <= -G) {
      player.z = -G
      player.vz *= -.2
    }
    
    renderer.x = player.x += player.vx /= player.hasTraction ? playerMdrag : 1
    renderer.z = player.z += player.vz /= player.hasTraction ? playerMdrag : 1
    renderer.y += (player.y - renderer.y) / 2
    renderer.yaw += (player.yaw - renderer.yaw) / 1.5
    
    player.pitch = Math.min(Math.PI/2, Math.max(-Math.PI/2, player.pitch))
    renderer.pitch += (player.pitch - renderer.pitch) / 1.5
  
    shapes.forEach(shape => {
      switch(shape.name){
        case 'background':
          renderer.Draw(shape)
        break
        case 'particles':
          var ar = shape.shader.datasets[0].optionalAttributes[0].value
          sparks = sparks.filter((v, i) => v.life > 0)
          buckshot = buckshot.filter((v, i) => v.life > 0)
          for(var i = 0; i < shape.vertices.length; i += 3){
            var idx = i/3
            if(buckshot.length && idx < buckshot.length && idx < 3e3){
              var bfl
              if(buckshot[idx].x > G || 
                 buckshot[idx].x < -G || 
                 buckshot[idx].z > G || 
                 buckshot[idx].z < -G || 
                buckshot[idx].y - (bfl = Floor((buckshot[idx].x + buckshot[idx].vx*2),(buckshot[idx].z + buckshot[idx].vz*2))) < 1){
                buckshot[idx].life = 0
                SpawnSparks(buckshot[idx].x, buckshot[idx].y, buckshot[idx].z)
              }else{
                x = buckshot[idx].x += buckshot[idx].vx
                y = buckshot[idx].y += buckshot[idx].vy
                z = buckshot[idx].z += buckshot[idx].vz
                buckshot[idx].life -= .01
                shape.vertices[i+0] = x
                shape.vertices[i+1] = y
                shape.vertices[i+2] = z
                ar[idx*4+0] = 1
                ar[idx*4+1] = 0
                ar[idx*4+2] = 0
                ar[idx*4+3] = 1
              }
            }else if(idx>=3e3 &&
                    sparks.length && idx - 3e3 < sparks.length && idx < 6e3){
              x = sparks[idx-3e3].x += sparks[idx-3e3].vx
              y = sparks[idx-3e3].y += sparks[idx-3e3].vy -= grav / 16
              z = sparks[idx-3e3].z += sparks[idx-3e3].vz
              shape.vertices[i+0] = x
              shape.vertices[i+1] = y
              shape.vertices[i+2] = z
              ar[idx*4+0] = 1 * 2
              ar[idx*4+1] = .75 * 2
              ar[idx*4+2] = 0
              ar[idx*4+3] = sparks[idx-3e3].life ** .5
              sparks[idx-3e3].life -= .05
            }else if(idx>=6e3 &&
                    markers.length && idx - 6e3 < markers.length && idx < 9e3){
              x = markers[idx-6e3][0]
              y = markers[idx-6e3][1]
              z = markers[idx-6e3][2]
              shape.vertices[i+0] = x
              shape.vertices[i+1] = y
              shape.vertices[i+2] = z
              ar[idx*4+0] = 0
              ar[idx*4+1] = 2
              ar[idx*4+2] = 0
              ar[idx*4+3] = 1
            }else{
              shape.vertices[i+0] = 1e5
              shape.vertices[i+1] = 1e5
              shape.vertices[i+2] = 1e5
            }
          }
          renderer.Draw(shape)
        break
        case 'main':
          renderer.Draw(shape)
        break
        case 'enclosure':
          renderer.Draw(shape)
        break
        default:
          renderer.Draw(shape)
        break
      }
    })
    
    ctx.clearRect(0,0,w,h)
    var gunSway
    var d = Math.hypot(player.vx, player.vy, player.vz)
    if(player.y > fl-playerHeight-5 && d > .1){
      gunSway = {
        x: S(t*2) * 50,
        y: 1+C(t*8) * 20 + 20
      }
    }else{
      gunSway = {
        x: 0,
        y: 0
      }
    }
    
    ctx.drawImage(shotgun, c.width/2-shotgun.width/2 + gunSway.x,
                           h-shotgun.height/1.75 + gunSway.y,
                           shotgun.width, shotgun.height/2.5)
    ctx.drawImage(HUD,0,0,w,h)
    
    
    ctx.font = '40px Technology'
    for(var i = 0; i < Math.min(12, player.ammo); i++){
      x = w/2 + 155 + i * shotshell.width * 1.1
      y = h-52
      ctx.drawImage(shotshell, x, y, shotshell.width, shotshell.height)
    }
    ctx.fillStyle = '#f808'
    ctx.strokeStyle = '#0008'
    ctx.lineWidth = 4
    ctx.textAlign = 'center'
    ctx.strokeText(player.ammo, w/2 + 110, h-16)
    ctx.fillText(player.ammo, w/2 + 110, h-16)
    if(player.ammo > 12){
      ctx.fillStyle = '#f00'
      ctx.strokeStyle = '#000'
      ctx.strokeText('. . .', w/2 + 120 + 14 * shotshell.width, h-20)
      ctx.fillText('. . .', w/2 + 120 + 14 * shotshell.width, h-20)
    }
    
    for(var i = 0; i < Math.min(19, (.9+player.health/5.5)|0); i++){
      x = w/2 + 155 + i * health.width * 1.1
      y = h-98
      ctx.drawImage(health, x, y, health.width, health.height)
    }
    ctx.fillStyle = '#0f28'
    ctx.strokeStyle = '#0008'
    ctx.lineWidth = 4
    ctx.textAlign = 'center'
    ctx.strokeText(player.health, w/2 + 110, h-65)
    ctx.fillText(player.health, w/2 + 110, h-65)
    
    HandleButtons()
  }
  renderer.c.focus()
  
</script>
