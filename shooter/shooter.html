<!DOCTYPE html>
<html>
  <head>
    <title>Coordinates boilerplate example</title>
    <style>
      @font-face {
        font-family: 'Technology';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url(https://srmcgann.github.io/objs/car/Technology-Bold.woff2) format('woff2');
      }
      html, body{
        background-repeat: no-repeat;
        background-position: center center;
        background-image: background-size: 100% 100%;
        background-color: #000;
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
      }
      .loadingText{
        position: absolute;
        color: #888;
        font-family: Technology;
        font-size: 200px;
        width: 600px;
        display: block;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .overlay{
        position: fixed;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        background: #111e;
        z-index: 100;
        display: none;
      }
    </style>
  </head>
  <body>
<script type="module">

  import * as Coordinates from
  "https://srmcgann.github.io/Coordinates/coordinates.min.js"
  //"https://cantelope42.github.io/tempp/coordinates.js"

  var rendererOptions = {
    ambientLight: .5, margin: 0,
    fov: 1e3, width: 1920, height: 1080,
    //fov: 1e3/2, width: 1920/2, height: 1080/2,
    // uncomment above for lower-res, higher-performance canvas
  }
  var renderer = await Coordinates.Renderer(rendererOptions)
  
  var S = Math.sin
  var C = Math.cos
  var Rn = Math.random
  
  var x, y, z, p, q, d
  
  Coordinates.AnimationLoop(renderer, 'Draw')
  var ctx = Coordinates.Overlay.ctx,c = Coordinates.Overlay.c, w = c.width, h = c.height


  var buttons = [
    {
      x: c.width - 85,
      y: 5,
      name: 'mute button',
      actCap: '[M] ' + (['\uD83D', '\uDD0A']).join(''),
      inactCap: '[M] ' + (['\uD83D', '\uDD07']).join(''),
      activeStrokeStyle: '#0f48',
      activeFillStyle: '#0628',
      inactiveStrokeStyle: '#c008',
      inactiveFillStyle: '#6008',
      activeTextColor: '#8fc',
      inactiveTextColor: '#f88',
      width: 80,
      height: 32,
      fontSize: 24,
      activeState: true,
      enabled: true,
      toolTip: 'mute / unmute',
      hover: false,
      clickScript: 'ToggleMute()',
    },
  ]


  const ToggleMute = (forceToggleButton = false) => {
    muted = !muted
    if(forceToggleButton){
      var el = buttons.filter(button => button.name = 'mute button')[0]
      el.activeState = !el.activeState
    }
    if(muted){
      if(!shotgunSound.paused){
        shotgunSound.pause()
      }
    }
  }
  
  var mouseReady = true
  window.onmouseup = () => {
    mouseReady = true
  }
  
  const HandleButtons = () => {
/*
    {
      x: c.width - 200,
      y: 20,
      actCap: '🔊'
      inactCap: '🔇'
      activeStrokeStyle: '#0f4'
      activeFillStyle: '#0628'
      inactiveStrokeStyle: '#c00'
      inactiveFillStyle: '#6008'
      activeTextColor: '#8fc',
      inactiveTextColor: '#f88',
      width: 100,
      height: 32,
      fontSize: 24,
      activeState: false,
      enabled: true,
    }
*/      


    //ctx.fillStyle = '#f00'
    //var s = 20
    var mx = renderer.mouseX
    var my = renderer.mouseY
    //ctx.fillRect(mx-s/2, my-s/2, s, s)
    ctx.textAlign = 'center'
    buttons.map((button, bIdx) => {
      var x1 = button.x
      var y1 = button.y
      var x2 = button.x + button.width
      var y2 = button.y + button.height
      if(button.activeState){
        ctx.strokeStyle = button.activeStrokeStyle
        ctx.fillStyle = button.activeFillStyle
        ctx.fillRect(button.x, button.y, button.width, button.height)
        ctx.strokeRect(button.x, button.y, button.width, button.height)
        ctx.fillStyle = button.activeTextColor
        fs = button.fontSize
        ctx.font = fs + 'px Technology'
        ctx.fillText(button.actCap,
                     button.x + button.width/2,
                     button.y + button.height/2 + fs/3)
      }else{
        ctx.strokeStyle = button.inactiveStrokeStyle
        ctx.fillStyle = button.inactiveFillStyle
        ctx.fillRect(button.x, button.y, button.width, button.height)
        ctx.strokeRect(button.x, button.y, button.width, button.height)
        ctx.fillStyle = button.inactiveTextColor
        fs = button.fontSize
        ctx.font = fs + 'px Technology'
        ctx.fillText(button.inactCap,
                     button.x + button.width/2,
                     button.y + button.height/2 + fs/3)
      }
      var fs = 16
      ctx.font = fs + 'px Technology'
      if(mouseReady){
        if(((button.hover || renderer.mouseButton == -1)) &&
          mx >= x1 && mx < x2 && my >= y1 && my < y2){
          button.hover = true
          ctx.fillStyle = '#333c'
          var textWidth = ctx.measureText(button.toolTip).width
          if(c.width-mx < textWidth + 5){
            ctx.fillRect(mx - textWidth - 20, my, textWidth + 20, fs*2)
            ctx.fillStyle = '#fffc'
            ctx.fillText(button.toolTip,
                  mx - textWidth/2 - 10, my+fs*1.33)
          }else{
            ctx.fillRect(mx - 10, my, textWidth + 20, fs*2)
            ctx.fillStyle = '#fffc'
            ctx.fillText(button.toolTip,
                  mx + textWidth/2, my+fs*1.33)
          }
          if(renderer.mouseButton != -1){
            if(!(mx >= x1 && mx < x2 && my >= y1 && my < y2)){
              button.hover = false
            }
            button.activeState = !button.activeState
            mouseReady = false
            eval(button.clickScript)
          }
        }else{
          button.hover = false
        }
      }
    })
  }

  var iPc = 9e3
  var geometryData = Array(iPc).fill().map((v, i) => {
    return [1e5, 1e5, 1e5]
  })
  var colors = []
  Array(iPc).fill().map((v, i) => {
    var rgb   = Coordinates.HSVToRGB(360/iPc*i, 1, 1)
    var red   = rgb[0] / 256
    var green = rgb[1] / 256
    var blue  = rgb[2] / 256
    colors.push(red, green, blue, 1)

  var shotgun = new Image()

  fetch(url).then(res=>res.blob()).then(data => {

  fetch(url).then(res=>res.blob()).then(data => {

  fetch(url).then(res=>res.blob()).then(data => {
    HUD.src = URL.createObjectURL(data)
  })

  var grav, playerMdrag, playerSpeed, playerHeight, playerRadius
  var G, floorLookup, resolution, mainURL, mainMap, extras, enclosureSize

  var enclosureOffsetX, enclosureOffsetY, enclosureOffsetZ
  var scaleX, scaleY, scaleZ, ambientLight, backgroundLight
  var shotSize, shotspeed, shotTimerInterval, shotgunSpread


  const LoadLevel = async level => {

        camSel = 0
        shotSize = 20
        shotspeed  = 25
        shotTimerInterval  = 0

        playerMdrag = 1.4
        playerSpeed = 4
        grav = 2
        playerHeight = 40
        jumpHeight = playerHeight / 1.5
        playerRadius = playerHeight
        playbackSpeed = 1
        resolution = 50
        levelSize = 60
        G = levelSize * 25
        enclosureSize = G / 40
        enclosureSize = levelSize
        offsetX = 0
        offsetY = -100
        offsetZ = 0
        scaleX = 1
        scaleY = 1
        scaleZ = 1
        enclosureOffsetX = 0
        enclosureOffsetY = -200
        enclosureOffsetZ = 0
        ambientLight = .25
        backgroundLight = 1
        refTexture = 'https://srmcgann.github.io/skyboxes/HDRI/3.jpg'
        mainURL = 'https://srmcgann.github.io/objs2/maze arena 1/maze arena 1.obj'
        mainMap = 'https://srmcgann.github.io/objs2/maze arena 1/texture.png'
        extras = []
      break
      case 1:
        showEnclosure = true
        camSel = 0
        grav = 2
        shotSize = 20
        shotspeed  = 25
        shotTimerInterval  = .2
        shotgunSpread  = 2
        playerMdrag = 1.4
        playerSpeed = 2
        playerHeight = 32
        playerRadius = playerHeight / 1.5
        jumpHeight = playerHeight / 1.5
        playbackSpeed = 1
        resolution = 16
        levelSize = 150
        G = levelSize * 4.5
        enclosureSize = G / 4
        offsetX = 0
        offsetY = -100
        offsetZ = 0
        scaleX = 1
        scaleY = 1
        scaleZ = 1
        enclosureOffsetX = 0
        enclosureOffsetY = -200
        enclosureOffsetZ = 0
        ambientLight = .25
        backgroundLight = .8
        refTexture = 'https://srmcgann.github.io/skyboxes3/HDRI/fantasy1.jpg'
        mainMap = 'https://srmcgann.github.io/objs2/cathedral/texture_new.png'
        mainURL = 'https://srmcgann.github.io/objs2/cathedral/floor_new.obj'
        extras = [
          {
            map: 'https://srmcgann.github.io/objs2/cathedral/texture_new.png',
            URL: 'https://srmcgann.github.io/objs2/cathedral/building_top_new.obj',
            shader: 'shader',
          },
          {
            map: 'https://srmcgann.github.io/objs2/cathedral/texture_new.png',
            URL: 'https://srmcgann.github.io/objs2/cathedral/glass.obj',
            shader: 'glassShader',
          }
        ]
      break
      case 2:
        showEnclosure = true
        camSel = 0
        grav = 2
        shotSize = 20
        shotspeed  = 25
        shotTimerInterval  = .2
        shotgunSpread  = 2
        playerMdrag = 1.4
        playerSpeed = 2
        playerHeight = 32
        playerRadius = playerHeight / 1.5
        jumpHeight = playerHeight / 1.5
        playbackSpeed = 1
        resolution = 50
        levelSize = 300
        G = levelSize * 4.5
        enclosureSize = G / 4
        offsetX = 0
        offsetY = -100
        offsetZ = 0
        scaleX = 1
        scaleY = 1
        scaleZ = 1
        enclosureOffsetX = 0
        enclosureOffsetY = -200
        enclosureOffsetZ = 0
        ambientLight = .25
        backgroundLight = .8
        refTexture = 'https://srmcgann.github.io/skyboxes/HDRI/19.jpg'
        mainURL = 'https://srmcgann.github.io/objs2/island/land.obj'
        mainMap = 'https://srmcgann.github.io/objs2/island/texture.png'
        extras = [
          {
            map: 'https://srmcgann.github.io/objs2/island/texture.png',
            URL: 'https://srmcgann.github.io/objs2/island/ocean and trees.obj',
            shader: 'glassShader',
          }
        ]
      break
      case 3:
        showEnclosure = true
        camSel = 0
        grav = 2
        shotSize = 20
        shotspeed  = 25
        shotTimerInterval  = .2
        shotgunSpread  = 2
        playerMdrag = 1.4
        playerSpeed = 2
        playerHeight = 50
        playerRadius = playerHeight / 1.5
        jumpHeight = playerHeight / 1.5
        playbackSpeed = 1
        resolution = 50
        levelSize = 200
        G = levelSize * 4.5
        enclosureSize = G / 4
        offsetX = 0
        offsetY = -100
        offsetZ = 0
        scaleX = 1
        scaleY = -.5
        scaleZ = 1
        enclosureOffsetX = 0
        enclosureOffsetY = -200
        enclosureOffsetZ = 0
        ambientLight = .25
        backgroundLight = .8
        refTexture = 'https://srmcgann.github.io/skyboxes3/HDRI/pinkCluds.jpg'
        mainURL = 'https://srmcgann.github.io/objs2/eggcrate 2/eggcrate 2.obj'
        mainMap = 'https://srmcgann.github.io/objs2/eggcrate 2/texture.png'
        extras = []
      break
      case 4:
        showEnclosure = true
        camSel = 0
        grav = 2
        shotSize = 20
        shotspeed  = 25
        shotTimerInterval  = .2
        shotgunSpread  = 2
        playerMdrag = 1.4
        playerSpeed = 2
        playerHeight = 50
        jumpHeight = playerHeight / 2
        playerRadius = playerHeight / 1.5
        playbackSpeed = 1
        resolution = 40
        levelSize = 150
        G = levelSize * 4.5
        enclosureSize = G / 4
        offsetX = 0
        offsetY = -100
        offsetZ = 0
        scaleX = 1
        scaleY = .66
        scaleZ = 1
        enclosureOffsetX = 0
        enclosureOffsetY = -200
        enclosureOffsetZ = 0
        ambientLight = .5
        backgroundLight = .6
        extras = []
        refTexture = 'https://srmcgann.github.io/skyboxes3/HDRI/ultracloudsbase.jpg'
        mainURL = 'https://srmcgann.github.io/objs2/pyramid/pyramid.obj'
        mainMap = 'https://srmcgann.github.io/objs2/pyramid/texture.png'
      break
      case 5:
        showEnclosure = true
        camSel = 0
        grav = 1.1
        shotSize = 20
        shotspeed  = 25
        shotTimerInterval  = .2
        shotgunSpread  = 2
        playerMdrag = 1.4
        playerSpeed = 2
        playerHeight = 64
        playerRadius = playerHeight / 1.5
        jumpHeight = playerHeight / 2
        playbackSpeed = 1
        resolution = 50
        levelSize = 250
        G = levelSize * 4.5
        enclosureSize = G / 4.5
        offsetX = 0
        offsetY = -100
        offsetZ = 0
        scaleX = 1
        scaleY = .5
        scaleZ = 1
        enclosureOffsetX = 0
        enclosureOffsetY = -200
        enclosureOffsetZ = 0
        ambientLight = .25
        backgroundLight = .8
        extras = []
        refTexture = 'https://srmcgann.github.io/skyboxes2/HDRI/stars2.jpg'
        mainURL = 'https://srmcgann.github.io/objs2/eggcrate/eggcrate.obj'
        mainMap = 'https://srmcgann.github.io/objs2/eggcrate/eggcrate.png'
      break
      case 6:
        showEnclosure = false
        camSel = 0
        shotSize = 20
        shotspeed  = 25
        shotTimerInterval  = 0
        shotgunSpread  = 2
        playerMdrag = 1.4
        playerSpeed = 5
        grav = 3
        playerHeight = 80
        jumpHeight = playerHeight / 1.5
        playerRadius = playerHeight / 3
        playbackSpeed = 1
        resolution = 50
        levelSize = 250
        G = levelSize * 4.5
        enclosureSize = G / 4.5
        offsetX = 0
        offsetY = -100
        offsetZ = 0
        scaleX = 1
        scaleY = 1
        scaleZ = 1
        enclosureOffsetX = 0
        enclosureOffsetY = -200
        enclosureOffsetZ = 0
        ambientLight = .25
        backgroundLight = .8
        extras = []
        refTexture = 'https://srmcgann.github.io/skyboxes/HDRI/21.jpg'
        mainURL = 'https://srmcgann.github.io/objs2/spiral_platform2/spiral_platform2.obj'
        mainMap = 'https://srmcgann.github.io/objs2/spiral_platform2/texture.png'
      break
    }

    var shaderOptions = [
      {lighting: {type: 'ambientLight', value: ambientLight}},
      { uniform: {
        type: 'phong',
        value: .4
      } },
      { uniform: {
        type: 'reflection',
        map: refTexture,
        playbackSpeed,
        value: .05
      } },
    ]
    var shader = await Coordinates.BasicShader(renderer, shaderOptions)

    var shaderOptions = [
      {lighting: {type: 'ambientLight', value: .5 * ambientLight}},
      { uniform: {
        type: 'phong',
        value: .1
      } },
      { uniform: {
        type: 'reflection',
        playbackSpeed,
        map: refTexture,
        value: .15
      } },
      { uniform: {
        type: 'refraction2',
        angleOfRefraction: .05,
        playbackSpeed,
        map: refTexture,
        value: .25
      } },
    ]
    var glassShader = await Coordinates.BasicShader(renderer, shaderOptions)

    var shaderOptions = [
      {lighting: {type: 'ambientLight', value: .1}},
      { uniform: {
        type: 'phong',
        value: .05
      } },
      { uniform: {
        type: 'reflection',
        playbackSpeed,
        map: refTexture,
        value: .2
      } },
      { uniform: {
        type: 'refraction2',
        playbackSpeed,
        map: refTexture,
        angleOfRefraction: -.5,
        value: .3,
      } },
    ]
    var enclosureShader = await Coordinates.BasicShader(renderer, shaderOptions)

    if(typeof backgroundShape != 'undefined'){
      backgroundShape.rebindTextures = true
      backgroundShape.map = refTexture
      backgroundShape.shader.datasets.map((dataset) => {
        if(dataset?.optionalLighting){
          dataset.optionalLighting[0].value = backgroundLighting
        }
      })
    }
    
    
    var geoOptions = {
      shapeType: 'obj',
      //map: 'https://srmcgann.github.io/objs2/testEnvironment/texture.png',
      url: 'https://srmcgann.github.io/objs2/testEnvironment/enclosure.obj',
      name: 'enclosure',
      cullFace: '',
      disableDepthTest: true,
      flipNormals: false,
      alpha: .9,
      scaleX: enclosureSize,
      scaleY: enclosureSize,
      scaleZ: enclosureSize,
      color: 0x00ffff,
      colorMix: .2,
      objX: enclosureOffsetX,
      objY: enclosureOffsetY,
      objZ: enclosureOffsetZ,
    }
    if(showEnclosure) await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
      shapes.push(geometry)
      await enclosureShader.ConnectGeometry(geometry)
    })
    
    extras.map(async extra => {
      var geoOptions = {
        shapeType: 'obj',
        map: extra.map,
        url: extra.URL,
        name: 'extras',
        scaleX: levelSize,
        scaleY: levelSize,
        scaleZ: levelSize,
        colorMix: 0,
        objX: offsetX,
        objY: offsetY,
        objZ: offsetZ,
      }
      await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
        shapes.push(geometry)
        switch(extra.shader){
          case 'glassShader':
            await glassShader.ConnectGeometry(geometry)
          break
          case 'shader':
            await shader.ConnectGeometry(geometry)
          break
        }
      })
    })
      
    var geoOptions = {
      shapeType: 'obj',
      url: mainURL,
      map: mainMap,
      name: 'main',
      cullFace: '',
      flipNormals: false,
      showNormals: false,
      scaleX: levelSize * scaleX,
      scaleY: levelSize * scaleY,
      scaleZ: levelSize * scaleZ,
      color: 0x118822,
      colorMix: 0,
      objX: offsetX,
      objY: offsetY,
      objZ: offsetZ,
      //disableDepthTest: true,
      //alpha: .9,
    }
    await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
      var minx = 6e6
      var maxx = -6e6
      var miny = 6e6
      var maxy = -6e6
      var minz = 6e6
      var maxz = -6e6
      for(var i = 0; i < geometry.vertices.length; i += 9){
        var x1 = geometry.vertices[i+0]
        var z1 = geometry.vertices[i+2]
        var x2 = geometry.vertices[i+3]
        var z2 = geometry.vertices[i+5]
        var x3 = geometry.vertices[i+6]
        var z3 = geometry.vertices[i+8]
        ax = (x1+x2+x3) / 3
        az = (z1+z2+z3) / 3
        if(ax < minx) minx = ax
        if(ax > maxx) maxx = ax
        if(az < minz) minz = az
        if(az > maxz) maxz = az
      }
      floorLookup = Array(resolution**2).fill().map((v, i) => ({
        cx: 0, cz: 0,
        normalVecs: [],
        polyCenters: [],
      }))
      var width = (maxx-minx) * 1.00001
      var depth = (maxz-minz) * 1.00001
      for(var i = 0; i < geometry.vertices.length; i += 9){
        var x1 = geometry.vertices[i+0]
        var y1 = geometry.vertices[i+1]
        var z1 = geometry.vertices[i+2]
        var x2 = geometry.vertices[i+3]
        var y2 = geometry.vertices[i+4]
        var z2 = geometry.vertices[i+5]
        var x3 = geometry.vertices[i+6]
        var y3 = geometry.vertices[i+7]
        var z3 = geometry.vertices[i+8]
        ax = (x1+x2+x3) / 3
        ay = (y1+y2+y3) / 3
        az = (z1+z2+z3) / 3
        var idx1 = (ax-minx)/width*resolution | 0
        var idx2 = (az-minz)/depth*resolution | 0
        var idx = idx1 + idx2*resolution
        floorLookup[idx].polyCenters.push({ x: ax, y: ay, z: az })
        var nx=0, ny=0, nz=0
        for(var m = 0; m < 3; m++){
          nx += geometry.normalVecs[i+0+m*3]
          ny += geometry.normalVecs[i+1+m*3]
          nz += geometry.normalVecs[i+2+m*3]
        }
        nx /= 3
        ny /= 3
        nz /= 3
        floorLookup[idx].normalVecs.push({ x: nx, y: ny, z: nz })
      }
      floorLookup.map((v, i) => {
        var ax = 0
        //var ay = 0
        var az = 0
        v.polyCenters.map((q, j) => {
          ax += q.x
          //ay += q.y
          az += q.z
        })
        v.cx = ax /= v.polyCenters.length
        v.cz = az /= v.polyCenters.length
      })
      shapes.push(geometry)
      await shader.ConnectGeometry(geometry)
    })
  }
   
  var level = 2
  
  await LoadLevel(level)

  var shaderOptions = [
    {lighting: {type: 'ambientLight', value: 1.1}},
    { uniform: {
      type: 'phong',
      value: 0
    } }
  ]
  var backgroundShader = await Coordinates.BasicShader(renderer, shaderOptions)

  var backgroundShape
  var geoOptions = {
    shapeType: 'dodecahedron',
    name: 'background',
    sphereize: 1,
    subs: 4,
      playbackSpeed,
    map: refTexture,
    size: 5e3,
    colorMix: 0,
  }
  await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
    backgroundShape = geometry
    await backgroundShader.ConnectGeometry(geometry)
  })
  

  // create custom attribute shader
  var shaderOptions = [
    { attribute: {
      type: 'custom',
      enabled: true,         // can be disabled (removed from shader)
      value: colors,         // buffer data
      name: 'customColors',  // attribute name to inject into shader
      stride: 4,             // in this case, we're passing RGBA floats
      dataType: renderer.ctx.FLOAT,
      vertDeclaration: `     // vertex shader code, pre main
        attribute vec4 customColors;
        varying vec4 attribCols;
      `,
      vertCode:        `     // vertex shader code, in main function
        attribCols = customColors;
      `,
      fragDeclaration: `     // fragment shader code, pre main
        varying vec4 attribCols;
      `,
      fragCode: `            // fragment shader code, in main function
        mixColor = attribCols;
      `,
    }},
  ]
  var particleShader = await Coordinates.BasicShader(renderer, shaderOptions)

  var particlesShape
  var geoOptions = {
    shapeType: 'particles',
    name: 'particles',
    geometryData,
    alpha: .9,
    penumbra: .25,
    size: 2.5,
    color: 0xff0000,
  }
  await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
    particlesShape = geometry
    await particleShader.ConnectGeometry(geometry)
  })


  var markers = []
  const Floor = (x, y, z, pushMarkers = false) => {
    var mind = 6e6, mind2 = 6e6, idx = -1, position = { x: 0, y: 0, z: 0 }
    var nearestWallNormal = [0, 1, 0]
    var normalVec = {x: 0, y: 0, z: 0}
    floorLookup.forEach((v, i) => {
      if((d=Math.hypot(v.cx-x, v.cz-z))<mind){
        mind = d
        idx = i
      }
    })
    mind = 6e6
    floorLookup[idx].polyCenters.forEach((v, i) => {
      if(pushMarkers) markers.push([v.x, v.y, v.z])
      d=Math.hypot(v.x-x, v.z-z)
      //if(Math.abs(y-v.y) < playerHeight*2 && d < mind){
      if(d < mind){
        mind = d
        position = structuredClone(v)
        normalVec = [
          floorLookup[idx].normalVecs[i].x,
          floorLookup[idx].normalVecs[i].y,
          floorLookup[idx].normalVecs[i].z,
        ]
      }
      //if(Math.abs(y-v.y) < playerHeight*2 && d < mind2 && 
      if(d < mind2 && 
         Math.abs(Math.acos(floorLookup[idx].normalVecs[i].y) -
                  Math.PI/2) < Math.PI/4){
        mind2 = d
        nearestWallNormal = [
          floorLookup[idx].normalVecs[i].x,
          floorLookup[idx].normalVecs[i].y,
          floorLookup[idx].normalVecs[i].z,
        ]
      }
    })
    
    return {position, normalVec, nearestWallNormal}
  }
  
  
  const SpawnPlayer = () => {
    players.push({
      x: 0,
      y: 0,
      z: 0,
      ox: 0,
      oy: 0,
      oz: 0,
      vx: 0,
      vy: 0,
      vz: 0,
      roll: 0,
      pitch: 0,
      yaw: 0,
      ammo: 500,
      health: 100,
      shotTimer: 0,
      keys: Array(256).fill(false),
      keyTimers: Array(256).fill(0),
      id: players.length,
      hasTraction: false,
      name: 'human player',
    })
  }
  
  window.onclick = () => {
    if(!buttons.filter(button=>button.name=='mute button')[0].hover){
      if(!document.pointerLockElement){
        renderer.c.requestPointerLock()
      }
    }
  }
  
  window.onmousemove = e => {
    if(document.pointerLockElement){
      var player = players[0]
      player.yaw -= e.movementX / 100
      player.pitch += e.movementY / 100
    }
  }
  
  window.onkeydown = e => {
    console.log(e.keyCode)
    if(e.keyCode == 77){
      ToggleMute(true)
    }
    players[0].keys[e.keyCode] = true
  }
  
  window.onkeyup = e => {
    players[0].keys[e.keyCode] = false
  }
  
  const DoKeys = () => {
    var player = players[0]
    player.keys.map((state, key) =>{
      if(state){
        switch(key){
          case 32: // space
            if(player.keyTimers[key] < renderer.t)
            player.keyTimers[key] = renderer.t + keyTimerInterval
          break
          case 37: // left arrow
          break
          case 38: // up arrow
          break
          case 39: // right arrow
          break
          case 40: // down arrow
          break
          case 87: //W
            if(player.hasTraction){
              var p = -renderer.yaw + Math.PI
              var accel = player.keys[16] ? 3 : 1
              player.vx += S(p) * playerSpeed * accel
              player.vz += C(p) * playerSpeed * accel
            }
          break
          case 65: //A
            if(player.hasTraction){
              var p = -renderer.yaw + Math.PI/2
              var accel = player.keys[16] ? 3 : 1
              player.vx += S(p) * playerSpeed * accel
              player.vz += C(p) * playerSpeed * accel
            }
          break
          case 83: //S
            if(player.hasTraction){
              var p = -renderer.yaw
              var accel = player.keys[16] ? 3 : 1
              player.vx += S(p) * playerSpeed * accel
              player.vz += C(p) * playerSpeed * accel
            }
          break
          case 68: //D
            if(player.hasTraction){
              var p = -renderer.yaw - Math.PI / 2
              var accel = player.keys[16] ? 3 : 1
              player.vx += S(p) * playerSpeed * accel
              player.vz += C(p) * playerSpeed * accel
            }
          break
        }
      }
    })
  }
  
  SpawnPlayer()
  
  Coordinates.LoadFPSControls(renderer, {
    flyMode: true,
    useKeys: false,
    crosshairSel: 1,
    crosshairAlpha: .1,
    crosshairSize: 2,
    mSpeed: 2,
  })
  
  var buckshot = []
  const SpawnShot = player => {
    x = -player.x
    y = -player.y - 2
    z = -player.z
    var p1 = -player.yaw
    var p2 = -player.pitch
    if(!shotgunSound.paused) shotgunSound.pause()
    if(!muted){
      shotgunSound.currentTime = 0
      shotgunSound.play()
    }
    for(var i = 0; i < shotSize; i++){
      var vx = 0
      var vy = 0
      var vz = shotspeed
      p = Math.atan2(vy, vz) + p2
      d = Math.hypot(vy, vz)
      vy = S(p) * d
      vz = C(p) * d
      p = Math.atan2(vx, vz) + p1
      d = Math.hypot(vx, vz)
      vx = S(p) * d
      vz = C(p) * d
      buckshot.push({
        x, y, z,
        vx: vx + ((Rn()-.5)*shotgunSpread),
        vy: vy + ((Rn()-.5)*shotgunSpread),
        vz: vz + ((Rn()-.5)*shotgunSpread),
        life: 1
      })
    }
  }
  
  var iSparkv = 3
  var iSparkc = 10
  var sparks = []
  var sensorPoints = []
  const SpawnSparks = (x, y, z) => {
    for(var i = 0; i < iSparkc; i++){
      var v = .25 + Rn() * iSparkv * .75
      var p1 = Rn() * Math.PI * 2
      var p2 = Math.PI/2 *Rn()** .5
      var vx = S(p1) * S(p2) * v
      var vy = C(p2) * v * 2
      var vz = C(p1) * S(p2) * v
      sparks.push({
        x, y, z,
        vx, vy, vz,
        life: 1
      })
    }
  }
  
  renderer.z = renderer.width > 1e3 ? 10 : 20
  var fl, cx, cz
  
  window.Draw = () => {
    var t = renderer.frameCount / 60
    renderer.Clear()
    
    markers = []
    sensorPoints = []
  
    DoKeys()
    
    var player = players[camSel]
    
    if(renderer.mouseButton == -1){
        player.shotTimer = 0
    }
    
    if(player.hasTraction){
      player.vy = 0
    }
    // jump
    if(renderer.mouseButton == 2 && player.hasTraction) {
      player.vy -= jumpHeight
    }
  
    if(renderer.mouseButton == 1 &&
       !buttons.filter(button=>button.name=='mute button')[0].hover) {
      if(player.shotTimer <= t){
        if(player.ammo > 0){
          player.shotTimer = t + shotTimerInterval
          player.ammo--
          SpawnShot(player)
          recoil += 50
        }else{
          if(!player.ammo){
            player.shotTimer = t + shotTimerInterval / 1
            if(!shotgunEmpty.paused) shotgunEmpty.pause()
            if(!muted){
              shotgunEmpty.currentTime = 0
              shotgunEmpty.play()
            }
          }
        }
      }
    }
  
    player.oy = player.y
    fl = -Floor(-player.x-player.vx, -player.y-player.vy, -player.z-player.vz).position.y
    player.hasTraction = player.y > fl-playerHeight-5
    var vx = 0
    var vy = 0
    var vz = 0
    for(var j = 0; j < 6; j++){
      p = Math.atan2(-player.vx, -player.vz) + Math.PI / 6 * j - Math.PI/2
      cx = -S(p) * playerRadius
      cz = -C(p) * playerRadius
      var testCD = Floor(-player.x-player.vx-cx, -player.y-player.vy, -player.z-player.vz-cz, !j)
      sensorPoints.push([-player.x-cx, testCD.position.y, -player.z-cz])

      if(player.hasTraction){
        if(-fl-testCD.position.y < -playerHeight/2){// && -fl-testCD.position.y > -playerHeight){
          var a = [player.vx, 0, player.vz]
          var n = testCD.nearestWallNormal
          var r = Coordinates.Reflect(a, n)
          player.vx = r[0] / 1.5
          player.vz = r[2] / 1.5
        }
        
        if(0 && player.y-player.oy < -6)
          player.vy += Math.max(-35, (player.y-player.oy) * 80)
      }
    }
    
    player.y += player.vy += grav
    player.y = Math.min(fl - playerHeight, player.y)
    
    
    if(player.x >= G) {
      player.x = G
      player.vx *= -.2
    }
    if(player.x <= -G) {
      player.x = -G
      player.vx *= -.2
    }
    if(player.z >= G) {
      player.z = G
      player.vz *= -.2
    }
    if(player.z <= -G) {
      player.z = -G
      player.vz *= -.2
    }
    
    renderer.x = player.x += player.vx /= player.hasTraction ? playerMdrag : 1
    renderer.z = player.z += player.vz /= player.hasTraction ? playerMdrag : 1
    renderer.y += (player.y - renderer.y) / 2
    renderer.yaw += (player.yaw - renderer.yaw) / 1.5
    
    player.pitch = Math.min(Math.PI/2, Math.max(-Math.PI/2, player.pitch))
    renderer.pitch += (player.pitch - renderer.pitch) / 1.5
  
    renderer.Draw(backgroundShape)
    
    // particles
    var ar = particlesShape.shader.datasets[0].optionalAttributes[0].value
    sparks = sparks.filter((v, i) => v.life > 0)
    buckshot = buckshot.filter((v, i) => v.life > 0)
    sensorPoints.forEach(v=>markers.push(v))
    for(var i = 0; i < particlesShape.vertices.length; i += 3){
      var idx = i/3
      
      if(buckshot.length && idx < buckshot.length && idx < 3e3){
        x = buckshot[idx].x
        y = buckshot[idx].y
        z = buckshot[idx].z
        var vx = buckshot[idx].vx
        var vy = buckshot[idx].vy
        var vz = buckshot[idx].vz
        var bfl = -Floor(x+vx, y+vy, z+vz, true).position.y
        if(x > G || x < -G || z > G || z < -G || -y > bfl-10){
          buckshot[idx].life = 0
          SpawnSparks(x, y-vy/4, z)
        }else{
          x = buckshot[idx].x += buckshot[idx].vx
          y = buckshot[idx].y += buckshot[idx].vy
          z = buckshot[idx].z += buckshot[idx].vz
          buckshot[idx].life -= .02
          particlesShape.vertices[i+0] = x
          particlesShape.vertices[i+1] = y
          particlesShape.vertices[i+2] = z
          ar[idx*4+0] = 1
          ar[idx*4+1] = 0
          ar[idx*4+2] = 0
          ar[idx*4+3] = 1
        }
      }else if(idx>=3e3 &&
              sparks.length && idx - 3e3 < sparks.length && idx < 6e3){
        x = sparks[idx-3e3].x += sparks[idx-3e3].vx
        y = sparks[idx-3e3].y += sparks[idx-3e3].vy -= grav / 10
        z = sparks[idx-3e3].z += sparks[idx-3e3].vz
        particlesShape.vertices[i+0] = x
        particlesShape.vertices[i+1] = y
        particlesShape.vertices[i+2] = z
        ar[idx*4+0] = 1 * 2
        ar[idx*4+1] = .75 * 2
        ar[idx*4+2] = 0
        ar[idx*4+3] = sparks[idx-3e3].life ** .5
        sparks[idx-3e3].life -= .05
      }else if(idx>=6e3 &&
              markers.length && idx - 6e3 < markers.length && idx < 9e3){
        x = markers[idx-6e3][0]
        y = markers[idx-6e3][1]
        z = markers[idx-6e3][2]
        particlesShape.vertices[i+0] = x
        particlesShape.vertices[i+1] = y
        particlesShape.vertices[i+2] = z
        if(idx - 6e3 > markers.length - 7){ // actual floor point
          ar[idx*4+0] = 2
          ar[idx*4+1] = 0
          ar[idx*4+2] = 2
          ar[idx*4+3] = 1
        }else{
          ar[idx*4+0] = 0
          ar[idx*4+1] = 2
          ar[idx*4+2] = 0
          ar[idx*4+3] = 1
        }
      }else{
        particlesShape.vertices[i+0] = 1e5
        particlesShape.vertices[i+1] = 1e5
        particlesShape.vertices[i+2] = 1e5
      }
    }
    renderer.Draw(particlesShape)
    ///////////
  
    shapes.forEach(shape => {
      switch(shape.name){
        case 'main':
          shape.x = 0
          shape.y = 0
          shape.z = 0
          renderer.Draw(shape)
        break
        case 'glass':
          shape.x = 0
          shape.y = 0
          shape.z = 0
          renderer.Draw(shape)
        break
        case 'extras':
          shape.x = 0
          shape.y = 0
          shape.z = 0
          renderer.Draw(shape)
        break
        case 'enclosure':
          shape.x = 0
          shape.y = 0
          shape.z = 0
          renderer.Draw(shape)
        break
        default:
          renderer.Draw(shape)
        break
      }
    })
    
    ctx.clearRect(0,0,w,h)
    var gunSway
    var d = Math.hypot(player.vx, player.vz)
    if(player.hasTraction && d > .05){
      gunSway = {
        x: S(t*4) * 50,
        y: 1+C(t*10) * 20 + 20
      }
    }else{
      gunSway = {
        x: 0,
        y: 0
      }
    }
    
    recoil = Math.min(200, recoil)
    ctx.drawImage(shotgun, c.width/2-shotgun.width/2 + gunSway.x,
                           h-shotgun.height/1.75 + gunSway.y + recoil,
                           shotgun.width, shotgun.height/2.5)
    ctx.drawImage(HUD,0,0,w,h)
    recoil /= 1.5
    
    ctx.font = '40px Technology'
    for(var i = 0; i < Math.min(12, player.ammo); i++){
      x = w/2 + 155 + i * shotshell.width * 1.1
      y = h-52
      ctx.drawImage(shotshell, x, y, shotshell.width, shotshell.height)
    }
    ctx.fillStyle = '#f808'
    ctx.strokeStyle = '#0008'
    ctx.lineWidth = 4
    ctx.textAlign = 'center'
    ctx.strokeText(player.ammo, w/2 + 110, h-16)
    ctx.fillText(player.ammo, w/2 + 110, h-16)
    if(player.ammo > 12){
      ctx.fillStyle = '#f00'
      ctx.strokeStyle = '#000'
      ctx.strokeText('. . .', w/2 + 120 + 14 * shotshell.width, h-20)
      ctx.fillText('. . .', w/2 + 120 + 14 * shotshell.width, h-20)
    }
    
    for(var i = 0; i < Math.min(19, (.9+player.health/5.5)|0); i++){
      x = w/2 + 155 + i * health.width * 1.1
      y = h-98
      ctx.drawImage(health, x, y, health.width, health.height)
    }
    ctx.fillStyle = '#0f28'
    ctx.strokeStyle = '#0008'
    ctx.lineWidth = 4
    ctx.textAlign = 'center'
    ctx.strokeText(player.health, w/2 + 110, h-65)
    ctx.fillText(player.health, w/2 + 110, h-65)
    
    HandleButtons()
  }
  renderer.c.focus()
  
</script>
  </body>
</html>
